<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday Rumi</title>

  <link rel="stylesheet" href="css/style.css">
</head>

<body class="home">

  <div class="container">

    <div class="card hero-card">

      <p class="small-title">for you, Eima ♡</p>

      <h1>Happy Birthday!</h1>

      <p class="desc">
        semoga hari ini menjadi awal dari semua hal baik untukmu,
        dan kamu selalu bahagia.
      </p>

      <img src="1.png" class="main-character" alt="Birthday Scara">

      <a href="wishes.html" class="btn">
        mulai →
      </a>

    </div>

  </div>
  <script src="js/script.js"></script>
  <script>
    // Remove background color (auto-detect based on top-left pixel)
    const img = document.querySelector('.main-character');
    if (img) {
      // Avoid double processing
      let processed = false;

      img.onload = function () {
        if (processed) return;

        const canvas = document.createElement('canvas');
        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        ctx.drawImage(img, 0, 0);

        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;

        // Sample top-left pixel as background color
        const bgR = data[0];
        const bgG = data[1];
        const bgB = data[2];

        const tolerance = 40;

        for (let i = 0; i < data.length; i += 4) {
          const r = data[i];
          const g = data[i + 1];
          const b = data[i + 2];

          // Check if pixel is close to background color
          if (Math.abs(r - bgR) <= tolerance &&
            Math.abs(g - bgG) <= tolerance &&
            Math.abs(b - bgB) <= tolerance) {
            data[i + 3] = 0; // make transparent
          }
        }

        processed = true;
        ctx.putImageData(imageData, 0, 0);
        img.src = canvas.toDataURL('image/png');
      };

      // Trigger reload if already cached
      if (img.complete) {
        const src = img.src;
        img.src = '';
        img.src = src;
      }
    }
  </script>
</body>

</html>
